<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vacances scolaires — Zone B</title>
  <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f5f7fa; color: #1a1a1a; padding: 20px; }
    h1 { font-size: 16px; font-weight: 700; color: #1f4e79; margin-bottom: 4px; }
    .subtitle { font-size: 12px; color: #666; margin-bottom: 8px; }
    .annees-info { font-size: 12px; color: #2e75b6; background: #d6e4f0;
      padding: 6px 12px; border-radius: 4px; margin-bottom: 16px; display: inline-block; }
    .btn { display: inline-flex; align-items: center; gap: 8px; background: #1f4e79;
      color: white; border: none; border-radius: 6px; padding: 10px 20px;
      font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
    .btn:hover { background: #2e75b6; }
    .btn:disabled { background: #999; cursor: not-allowed; }
    .spinner { display: none; width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.4); border-top-color: white;
      border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #status { margin-top: 16px; padding: 10px 14px; border-radius: 6px;
      font-size: 13px; display: none; }
    #status.ok    { background: #e2efda; color: #375623; border-left: 4px solid #375623; }
    #status.error { background: #fce4d6; color: #843c0c; border-left: 4px solid #843c0c; }
    #status.info  { background: #d6e4f0; color: #1f4e79; border-left: 4px solid #1f4e79; }
    #last-update { margin-top: 10px; font-size: 11px; color: #888; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 12px; }
    th { background: #1f4e79; color: white; padding: 8px 10px; text-align: left; font-weight: 600; }
    td { padding: 7px 10px; border-bottom: 1px solid #e0e0e0; background: white; }
    tr:nth-child(even) td { background: #f5f7fa; }
    #preview { display: none; }
    #preview h2 { font-size: 13px; color: #1f4e79; margin-top: 20px; margin-bottom: 8px; }
  </style>
</head>
<body>
  <h1>🗓️ Vacances scolaires — Zone B</h1>
  <p class="subtitle">Source : data.education.gouv.fr · API officielle Éducation nationale</p>
  <p class="annees-info" id="annees-label"></p>

  <button class="btn" id="btn-refresh">
    <span class="spinner" id="spinner"></span>
    <span id="btn-label">🔄 Actualiser les vacances zone B</span>
  </button>

  <div id="status"></div>
  <div id="last-update"></div>

  <div id="preview">
    <h2>Aperçu des données importées</h2>
    <table>
      <thead><tr>
        <th>Année scolaire</th><th>Description</th><th>Début</th><th>Fin (reprise)</th>
      </tr></thead>
      <tbody id="preview-body"></tbody>
    </table>
  </div>

<script>
const TABLE_NAME = "t_vacances";

// URL correcte : /api/v2/ (et non v2.1)
const API_BASE =
  "https://data.education.gouv.fr/api/v2/catalog/datasets/" +
  "fr-en-calendrier-scolaire/records";

// ── Calcul des 3 années scolaires à conserver ─────────────────────────────────
function getAnneesVoulues() {
  const today = new Date();
  const month = today.getMonth() + 1;
  const year  = today.getFullYear();
  const debut = (month >= 9) ? year : year - 1;
  return [
    `${debut - 1}-${debut}`,
    `${debut}-${debut + 1}`,
    `${debut + 1}-${debut + 2}`,
  ];
}

// ── Helpers UI ────────────────────────────────────────────────────────────────
function setStatus(msg, type = "info") {
  const el = document.getElementById("status");
  el.textContent = msg;
  el.className = type;
  el.style.display = "block";
}

function setLoading(on) {
  document.getElementById("spinner").style.display = on ? "inline-block" : "none";
  document.getElementById("btn-refresh").disabled = on;
  document.getElementById("btn-label").textContent = on
    ? "Import en cours…"
    : "🔄 Actualiser les vacances zone B";
}

function fmtDate(isoStr) {
  if (!isoStr) return "";
  return new Date(isoStr).toLocaleDateString("fr-FR");
}

function toUnix(isoStr) {
  if (!isoStr) return null;
  return Math.floor(new Date(isoStr).getTime() / 1000);
}

// ── Init affichage années ─────────────────────────────────────────────────────
const anneesVoulues = getAnneesVoulues();
document.getElementById("annees-label").textContent =
  "Années récupérées : " + anneesVoulues.join(" · ");

// ── Récupération paginée ──────────────────────────────────────────────────────
// L'API v2 retourne max 100 enregistrements par appel.
// On boucle sur les 3 années pour être sûr de tout avoir.
async function fetchAnnee(annee) {
  const where = encodeURIComponent(
    `annee_scolaire="${annee}" AND zones="Zone B"`
  );
  const url = `${API_BASE}?where=${where}&limit=50&order_by=start_date`;
  const resp = await fetch(url);
  if (!resp.ok) {
    const body = await resp.text();
    throw new Error(`API HTTP ${resp.status} pour ${annee} : ${body.slice(0, 200)}`);
  }
  const json = await resp.json();
  // L'API v2 retourne { records: [ { record: { fields: {...} } }, … ] }
  return (json.records || []).map(r => r.record ? r.record.fields : r.fields || r);
}

// ── Fonction principale ───────────────────────────────────────────────────────
async function refreshVacances() {
  setLoading(true);
  setStatus("Connexion à data.education.gouv.fr…", "info");
  document.getElementById("preview").style.display = "none";

  try {
    // 1. Récupérer les données pour chaque année
    let allRecords = [];
    for (const annee of anneesVoulues) {
      setStatus(`Récupération ${annee}…`, "info");
      const records = await fetchAnnee(annee);
      allRecords = allRecords.concat(records);
    }

    if (allRecords.length === 0) {
      throw new Error(
        "Aucune période trouvée pour : " + anneesVoulues.join(", ") +
        ". Vérifiez que ces années sont publiées sur data.education.gouv.fr."
      );
    }

    setStatus(allRecords.length + " périodes récupérées — écriture dans Grist…", "info");

    // 2. Trouver l'ID Grist de la table
    const tables = await grist.docApi.listTables();
    const gristId = tables.find(t => t.toLowerCase() === TABLE_NAME.toLowerCase());
    if (!gristId) {
      throw new Error("Table \"" + TABLE_NAME + "\" introuvable. Tables : " + tables.join(", "));
    }

    // 3. Vider la table
    const existing = await grist.docApi.fetchTable(gristId);
    if (existing.id && existing.id.length > 0) {
      await grist.docApi.applyUserActions([
        ["BulkRemoveRecord", gristId, existing.id]
      ]);
    }

    // 4. Préparer les lignes
    // Champs API v2 : description, start_date, end_date, annee_scolaire, zones, location
    const rows = allRecords.map(f => ({
      annee_scolaire: (f.annee_scolaire || "").trim(),
      description:    (f.description    || "").trim(),
      date_debut:     toUnix(f.start_date),
      date_fin:       toUnix(f.end_date),
    }));

    // 5. Insérer
    await grist.docApi.applyUserActions([
      ["BulkAddRecord", gristId, rows.map(() => null), {
        annee_scolaire: rows.map(r => r.annee_scolaire),
        description:    rows.map(r => r.description),
        date_debut:     rows.map(r => r.date_debut),
        date_fin:       rows.map(r => r.date_fin),
      }]
    ]);

    // 6. Affichage
    document.getElementById("last-update").textContent =
      "Dernière mise à jour : " + new Date().toLocaleString("fr-FR");

    const tbody = document.getElementById("preview-body");
    tbody.innerHTML = "";
    rows.forEach(r => {
      const tr = document.createElement("tr");
      tr.innerHTML =
        "<td>" + r.annee_scolaire + "</td>" +
        "<td>" + r.description + "</td>" +
        "<td>" + fmtDate(r.date_debut ? new Date(r.date_debut * 1000).toISOString() : null) + "</td>" +
        "<td>" + fmtDate(r.date_fin   ? new Date(r.date_fin   * 1000).toISOString() : null) + "</td>";
      tbody.appendChild(tr);
    });
    document.getElementById("preview").style.display = "block";

    setStatus("✅ " + rows.length + " périodes importées pour : " + anneesVoulues.join(", "), "ok");

  } catch (err) {
    setStatus("❌ Erreur : " + err.message, "error");
    console.error(err);
  } finally {
    setLoading(false);
  }
}

document.getElementById("btn-refresh").addEventListener("click", refreshVacances);
grist.ready({ requiredAccess: "full", columns: [], allowSelectBy: false });
</script>
</body>
</html>
