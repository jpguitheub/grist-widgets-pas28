<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vacances scolaires — Zone B</title>
  <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f5f7fa; color: #1a1a1a; padding: 20px; }
    h1 { font-size: 16px; font-weight: 700; color: #1f4e79; margin-bottom: 4px; }
    .subtitle { font-size: 12px; color: #666; margin-bottom: 8px; }
    .annees-info { font-size: 12px; color: #2e75b6; background: #d6e4f0;
      padding: 6px 12px; border-radius: 4px; margin-bottom: 16px; display: inline-block; }
    .btn { display: inline-flex; align-items: center; gap: 8px; background: #1f4e79;
      color: white; border: none; border-radius: 6px; padding: 10px 20px;
      font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
    .btn:hover { background: #2e75b6; }
    .btn:disabled { background: #999; cursor: not-allowed; }
    .spinner { display: none; width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.4); border-top-color: white;
      border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #status { margin-top: 16px; padding: 10px 14px; border-radius: 6px;
      font-size: 13px; display: none; }
    #status.ok    { background: #e2efda; color: #375623; border-left: 4px solid #375623; }
    #status.error { background: #fce4d6; color: #843c0c; border-left: 4px solid #843c0c; }
    #status.info  { background: #d6e4f0; color: #1f4e79; border-left: 4px solid #1f4e79; }
    #last-update { margin-top: 10px; font-size: 11px; color: #888; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 12px; }
    th { background: #1f4e79; color: white; padding: 8px 10px; text-align: left; font-weight: 600; }
    td { padding: 7px 10px; border-bottom: 1px solid #e0e0e0; background: white; }
    tr:nth-child(even) td { background: #f5f7fa; }
    #preview { display: none; }
    #preview h2 { font-size: 13px; color: #1f4e79; margin-top: 20px; margin-bottom: 8px; }
  </style>
</head>
<body>
  <h1>🗓️ Vacances scolaires — Zone B</h1>
  <p class="subtitle">Source : ftp.opendatasoft.com (Éducation nationale) · Fichier iCal officiel</p>
  <p class="annees-info" id="annees-label"></p>

  <button class="btn" id="btn-refresh">
    <span class="spinner" id="spinner"></span>
    <span id="btn-label">🔄 Actualiser les vacances zone B</span>
  </button>

  <div id="status"></div>
  <div id="last-update"></div>

  <div id="preview">
    <h2>Aperçu des données importées</h2>
    <table>
      <thead><tr>
        <th>Année scolaire</th><th>Description</th><th>Début</th><th>Fin (reprise)</th>
      </tr></thead>
      <tbody id="preview-body"></tbody>
    </table>
  </div>

<script>
const TABLE_NAME = "t_vacances";

// URL du fichier iCal officiel zone B — hébergé par l'Éducation nationale
// Proxy CORS nécessaire car le navigateur ne peut pas fetch directement un FTP/HTTP tiers
// On utilise allorigins.win, proxy public gratuit sans clé
const ICS_URL = "https://fr.ftp.opendatasoft.com/openscol/fr-en-calendrier-scolaire/Zone-B.ics";
const PROXY   = "https://api.allorigins.win/raw?url=";

// ── Calcul des 3 années scolaires à conserver ─────────────────────────────────
function getAnneesVoulues() {
  const today = new Date();
  const month = today.getMonth() + 1;
  const year  = today.getFullYear();
  // Avant septembre → l'année scolaire courante a commencé l'an dernier
  const debut = (month >= 9) ? year : year - 1;
  return [
    `${debut - 1}-${debut}`,
    `${debut}-${debut + 1}`,
    `${debut + 1}-${debut + 2}`,
  ];
}

// ── Parser iCal minimaliste ───────────────────────────────────────────────────
// Extrait les événements VEVENT avec SUMMARY, DTSTART, DTEND
function parseICS(text) {
  const events = [];
  const vevents = text.split("BEGIN:VEVENT").slice(1);

  for (const block of vevents) {
    const get = (key) => {
      // Gère les lignes repliées (continuation avec espace/tab)
      const unfolded = block.replace(/\r?\n[ \t]/g, "");
      const m = unfolded.match(new RegExp(key + "[^:]*:([^\\r\\n]+)"));
      return m ? m[1].trim() : null;
    };

    const summary  = get("SUMMARY");
    const dtstart  = get("DTSTART");
    const dtend    = get("DTEND");

    if (!summary || !dtstart || !dtend) continue;

    // DTSTART peut être VALUE=DATE:20241019 ou 20241019T000000Z
    const parseDate = (s) => {
      const d = s.replace(/T.*$/, ""); // garde seulement YYYYMMDD
      return new Date(
        parseInt(d.slice(0,4)),
        parseInt(d.slice(4,6)) - 1,
        parseInt(d.slice(6,8))
      );
    };

    events.push({
      summary: summary.replace(/\\,/g, ",").replace(/\\n/g, " "),
      start:   parseDate(dtstart),
      end:     parseDate(dtend),  // dans iCal DTEND est exclusif (jour d'après)
    });
  }
  return events;
}

// Déduit l'année scolaire depuis une date de début d'événement
// ex: oct 2024 → "2024-2025" ; jan 2025 → "2024-2025"
function getAnneeScolaire(dateDebut) {
  const m = dateDebut.getMonth() + 1; // 1=jan…12=déc
  const y = dateDebut.getFullYear();
  const debut = (m >= 9) ? y : y - 1;
  return `${debut}-${debut + 1}`;
}

// ── Helpers UI ────────────────────────────────────────────────────────────────
function setStatus(msg, type = "info") {
  const el = document.getElementById("status");
  el.textContent = msg;
  el.className = type;
  el.style.display = "block";
}

function setLoading(on) {
  document.getElementById("spinner").style.display = on ? "inline-block" : "none";
  document.getElementById("btn-refresh").disabled = on;
  document.getElementById("btn-label").textContent = on
    ? "Import en cours…"
    : "🔄 Actualiser les vacances zone B";
}

function fmtDate(d) {
  if (!d) return "";
  return d.toLocaleDateString("fr-FR");
}

function toUnix(d) {
  if (!d) return null;
  return Math.floor(d.getTime() / 1000);
}

// ── Init affichage années ─────────────────────────────────────────────────────
const anneesVoulues = getAnneesVoulues();
document.getElementById("annees-label").textContent =
  "Années récupérées : " + anneesVoulues.join(" · ");

// ── Fonction principale ───────────────────────────────────────────────────────
async function refreshVacances() {
  setLoading(true);
  setStatus("Téléchargement du calendrier iCal zone B…", "info");
  document.getElementById("preview").style.display = "none";

  try {
    // 1. Télécharger le fichier iCal via proxy CORS
    const resp = await fetch(PROXY + encodeURIComponent(ICS_URL));
    if (!resp.ok) throw new Error("Téléchargement iCal : HTTP " + resp.status);
    const icsText = await resp.text();

    if (!icsText.includes("BEGIN:VEVENT")) {
      throw new Error("Le fichier iCal reçu semble vide ou invalide.");
    }

    // 2. Parser le iCal
    const allEvents = parseICS(icsText);
    setStatus(allEvents.length + " événements parsés — filtrage…", "info");

    // 3. Filtrer sur les 3 années scolaires voulues
    const events = allEvents.filter(e =>
      anneesVoulues.includes(getAnneeScolaire(e.start))
    );

    if (events.length === 0) {
      const anneesDispos = [...new Set(allEvents.map(e => getAnneeScolaire(e.start)))].sort();
      throw new Error(
        "Aucune période pour " + anneesVoulues.join(", ") +
        ". Années disponibles dans le fichier : " + anneesDispos.join(", ")
      );
    }

    setStatus(events.length + " périodes filtrées — écriture dans Grist…", "info");

    // 4. Trouver l'ID Grist de la table
    const tables = await grist.docApi.listTables();
    const gristId = tables.find(t => t.toLowerCase() === TABLE_NAME.toLowerCase());
    if (!gristId) {
      throw new Error("Table \"" + TABLE_NAME + "\" introuvable. Tables : " + tables.join(", "));
    }

    // 5. Vider la table
    const existing = await grist.docApi.fetchTable(gristId);
    if (existing.id && existing.id.length > 0) {
      await grist.docApi.applyUserActions([
        ["BulkRemoveRecord", gristId, existing.id]
      ]);
    }

    // 6. Insérer les nouvelles lignes
    // DTEND iCal est exclusif → on recule d'1 jour pour avoir le vrai dernier jour
    const rows = events.map(e => {
      const finReelle = new Date(e.end);
      finReelle.setDate(finReelle.getDate() - 1);
      return {
        annee_scolaire: getAnneeScolaire(e.start),
        description:    e.summary,
        date_debut:     toUnix(e.start),
        date_fin:       toUnix(finReelle),
      };
    });

    await grist.docApi.applyUserActions([
      ["BulkAddRecord", gristId, rows.map(() => null), {
        annee_scolaire: rows.map(r => r.annee_scolaire),
        description:    rows.map(r => r.description),
        date_debut:     rows.map(r => r.date_debut),
        date_fin:       rows.map(r => r.date_fin),
      }]
    ]);

    // 7. Affichage
    document.getElementById("last-update").textContent =
      "Dernière mise à jour : " + new Date().toLocaleString("fr-FR");

    const tbody = document.getElementById("preview-body");
    tbody.innerHTML = "";
    rows.forEach(r => {
      const tr = document.createElement("tr");
      tr.innerHTML =
        "<td>" + r.annee_scolaire + "</td>" +
        "<td>" + r.description + "</td>" +
        "<td>" + fmtDate(new Date(r.date_debut * 1000)) + "</td>" +
        "<td>" + fmtDate(new Date(r.date_fin  * 1000)) + "</td>";
      tbody.appendChild(tr);
    });
    document.getElementById("preview").style.display = "block";

    setStatus("✅ " + rows.length + " périodes importées pour : " + anneesVoulues.join(", "), "ok");

  } catch (err) {
    setStatus("❌ Erreur : " + err.message, "error");
    console.error(err);
  } finally {
    setLoading(false);
  }
}

document.getElementById("btn-refresh").addEventListener("click", refreshVacances);
grist.ready({ requiredAccess: "full", columns: [], allowSelectBy: false });
</script>
</body>
</html>
